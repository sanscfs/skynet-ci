name: Reusable Skynet build

on:
  workflow_call:
    inputs:
      component:
        description: "Image name (e.g. skynet-identity, skynet-base)"
        required: true
        type: string
      context:
        description: "Build context path"
        default: "."
        type: string
      dockerfile:
        description: "Path to Dockerfile relative to context"
        default: "Dockerfile"
        type: string
      platforms:
        description: "Comma-separated buildx platforms"
        default: "linux/amd64,linux/arm64"
        type: string
      build-args:
        description: "Extra --build-arg lines (KEY=VAL, one per line)"
        default: ""
        type: string
      extra-tags:
        description: "Extra tags to push (one per line, fully-qualified)"
        default: ""
        type: string
      tag-latest:
        description: "Push <component>:latest and <component>:py3.12 style rolling tag"
        default: true
        type: boolean
      rolling-tag:
        description: "Rolling tag value (e.g. 'latest' or 'py3.12'); defaults to 'latest'"
        default: "latest"
        type: string
      bump-infra:
        description: "After a successful build, commit the image SHA to sanscfs/infra (skynet-apps/ or infra-apps/ values.yaml + manifests/ deployments)."
        default: true
        type: boolean
    secrets:
      NEXUS_PASSWORD:
        required: true
      INFRA_REPO_TOKEN:
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, linux, x64, k3s]
    steps:
      - uses: actions/checkout@v4

      - name: Set up buildx (remote, persistent daemon)
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://buildkitd.github-runner.svc:1234

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: docker-hosted.sanscfs.dev
          username: admin
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          component='${{ inputs.component }}'
          sha='${{ github.sha }}'
          tags="docker-hosted.sanscfs.dev/${component}:${sha}
          ghcr.io/sanscfs/${component}:${sha}"
          if [ "${{ inputs.tag-latest }}" = "true" ]; then
            rolling='${{ inputs.rolling-tag }}'
            tags="${tags}
          docker-hosted.sanscfs.dev/${component}:${rolling}
          ghcr.io/sanscfs/${component}:${rolling}"
          fi
          extra='${{ inputs.extra-tags }}'
          if [ -n "$extra" ]; then
            tags="${tags}
          ${extra}"
          fi
          {
            echo 'tags<<EOF'
            echo "$tags"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.context }}/${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          build-args: ${{ inputs.build-args }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=registry,ref=docker-hosted.sanscfs.dev/${{ inputs.component }}:buildcache
          cache-to:   type=registry,ref=docker-hosted.sanscfs.dev/${{ inputs.component }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true
          push: true

  bump-infra:
    if: ${{ inputs.bump-infra && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: build
    runs-on: [self-hosted, linux, x64, k3s]
    steps:
      - name: Clone and update infra
        env:
          TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
          COMPONENT: ${{ inputs.component }}
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${TOKEN:-}" ]; then
            echo "INFRA_REPO_TOKEN not set — skipping bump." ; exit 0
          fi
          tmp=$(mktemp -d)
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/sanscfs/infra.git" "$tmp"
          cd "$tmp"
          git config user.name "Skynet CI"
          git config user.email "skynet@sanscfs.dev"
          updated=false
          for values in "skynet-apps/${COMPONENT}/values.yaml" "infra-apps/${COMPONENT}/values.yaml"; do
            if [ -f "$values" ]; then
              sed -i "s|^\(  tag: \).*|\1\"${TAG}\"|" "$values"
              updated=true
            fi
          done
          kd="manifests/${COMPONENT}/deployment.yaml"
          if [ -f "$kd" ]; then
            sed -i "s|image:.*${COMPONENT}.*|image: ghcr.io/sanscfs/${COMPONENT}:${TAG}|" "$kd"
            updated=true
          fi
          if [ "$updated" = "true" ]; then
            git add -A
            git diff --cached --quiet \
              || git commit -m "ci(${COMPONENT}): update image to ${TAG}"
            git push
          else
            echo "No matching values.yaml / deployment.yaml for ${COMPONENT}; skipping."
          fi
